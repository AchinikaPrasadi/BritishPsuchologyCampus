<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | British Psychology Campus</title>

    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background:
          linear-gradient(rgba(0, 31, 63, 0.6), rgba(0, 31, 63, 0.6)),
          url("https://images.pexels.com/photos/267885/pexels-photo-267885.jpeg");
        background-size: cover;
        background-position: center;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .login-card {
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.2);
        max-width: 400px;
        width: 100%;
        text-align: center;
      }

      .login-card h2 {
        font-weight: 700;
        margin-bottom: 25px;
        color: #001f3f;
      }

      .login-card .form-control {
        border-radius: 50px;
        margin-bottom: 15px;
      }

      .login-card .btn-primary {
        border-radius: 50px;
        padding: 10px;
        font-weight: 600;
      }

      .login-card .forgot-password {
        font-size: 0.9rem;
        color: #001f3f;
        text-decoration: none;
      }

      .login-card .forgot-password:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="login-card">
      <img
        src="assets/logo.jpeg"
        alt="Campus Logo"
        class="mb-3"
        style="width: 70px; height: 70px; border-radius: 50%"
      />
      <h2>Student Login</h2>
      <form>
        <input
          type="email"
          class="form-control"
          placeholder="Email Address"
          required
        />
        <input
          type="password"
          class="form-control"
          placeholder="Password"
          required
        />
        <button type="submit" class="btn btn-primary w-100">Login</button>
        <a href="#" class="forgot-password d-block mt-3">Forgot Password?</a>
      </form>
      <p class="mt-3">
        Don't have an account? <a href="register.html">Sign Up</a>
      </p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
